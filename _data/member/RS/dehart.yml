bio: >
  Jen is a Research Scientist II in the Department of Atmospheric Science at 
  Colorado State University. Prior to arriving at CSU, Jen received her Ph.D. 
  from the University of Washington, where she worked with Prof. Robert Houze, 
  Jr. to understand how external forcings affect the three-dimensional 
  precipitation and kinematic structures of tropical cyclones. Jen’s research 
  interests include precipitation and microphysical processes within organized 
  tropical convection, and the inner-core structure and orographic modification 
  of tropical cyclones. Jen is also a PI of the Lidar Radar Open Software 
  Environment (LROSE) and enjoys collaborating with colleagues in the Open 
  Radar Science community. Throughout her career, Jen has been fortunate to 
  participate in several field campaigns, including VORTEX2, HS3, OLYMPEX, and 
  PRECIP. In her free time, Jen enjoys traveling, eating delicious food, and 
  exploring local tea shops.
